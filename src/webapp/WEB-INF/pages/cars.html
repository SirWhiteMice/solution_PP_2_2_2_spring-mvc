<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cars for sale</title>
</head>
<body>

<div th:each="car : ${cars}">
    <a th:text="${car.getManufacturer()}">manufacturer</a>
    <a th:text="${car.getModel()}">model</a>
    <a th:text="${car.getYear()}">year</a>
</div>

</body>
</html>
